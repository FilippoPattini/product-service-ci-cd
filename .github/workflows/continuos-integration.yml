# CI/CD Workflow for building, scanning, and deploying a Java project
# This workflow automates the full software lifecycle, including code quality checks, security scans, artifact building, and containerization.
# It ensures that all code merged into the main branch meets quality and security standards, builds successfully for multiple Java versions, and produces a deployable Docker image.

name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Lint Scan Job: perform automated code style, syntax, and formatting checks using Super-Linter
  # This job enforces consistent coding standards and detects potential issues early in the development cycle.
  # By focusing only on Java files, it ensures that Java-specific style rules and best practices are applied without interference from unrelated languages.
  lint-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v7.3.0
        env:
          VALIDATE_JAVA: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # GitGuardian Secrets Scan Job: detect and prevent accidental exposure of sensitive credentials in the codebase
  # This job scans all commits and pull requests for API keys, passwords, tokens, and other secrets.
  # Running this scan early in the CI pipeline reduces the risk of leaking sensitive data and ensures compliance with security best practices.
  gitguardian-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # Semgrep Security Scan Job: perform static application security testing (SAST)
  # This job uses Semgrep to analyze the code for security vulnerabilities, code patterns, and compliance issues.
  # By skipping Dependabot PRs, it avoids unnecessary scans on automated dependency updates while ensuring that human-written code is always checked.
  semgrep-scan:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # Build Artifact Job: compile Java code, run tests, and produce reusable artifacts for deployment
  # This job tests the project against multiple Java versions to ensure compatibility, builds the application using Maven, and uploads the resulting JAR files as artifacts.
  # These artifacts are stored in GitHub Actions so they can be consumed by downstream jobs, ensuring a reproducible build process.
  build-artifact:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [21, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package
        working-directory: product-service-ci-cd

      - name: Copy Build Artifact
        run: |
          mkdir -p staging
          cp product-service-ci-cd/target/*.jar staging

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact-java-${{ matrix.java-version }}
          path: staging

  # Build and Push Docker Image Job: containerize the application, scan for vulnerabilities, and deploy to Docker Hub
  # This job downloads the previously built artifacts, creates a Docker image containing the Java application, runs a security scan with Trivy to ensure no critical vulnerabilities are present, and then pushes the verified image to Docker Hub.
  # This ensures that the deployed image is reproducible, secure, and ready for deployment in production or cloud environments.
  build-push-container-image:
    runs-on: ubuntu-latest
    needs: build-artifact

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact-java-21
          path: product-service-ci-cd/target

      - name: Build Docker Image
        working-directory: product-service-ci-cd
        run: docker build -t nbicocchi/product-service-ci-cd:latest .

      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: 'docker.io/nbicocchi/product-service-ci-cd:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image to Docker Hub
        run: docker push nbicocchi/product-service-ci-cd:latest
